# Wayland-Core project config.
# v0.7.0 1.B.2: generated by `wayland-core init`. Edit freely;
# subsequent `init` runs preserve this file unless --force is set.

model = "claude-opus-4-8"

[provider]
name = "anthropic"
api_key = "${ANTHROPIC_API_KEY}"

[metrics]
enabled = true
port = 9091

[memory]
# Persistent memory + skill telemetry sink (M3.5).
# Disable in CI by setting WAYLAND_MEMORY=0.
enabled = true

[observability]
# When true, skill lifecycle events flow to the trace sink even
# without full memory enabled. Cheap; on by default.
skills_lifecycle = true
