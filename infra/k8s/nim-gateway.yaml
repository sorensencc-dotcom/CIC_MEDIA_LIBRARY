apiVersion: apps/v1
kind: Deployment
metadata:
  name: nim-gateway
  namespace: ai-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nim-gateway
  template:
    metadata:
      labels:
        app: nim-gateway
    spec:
      containers:
        - name: nim-gateway
          image: nvcr.io/nvidia/nim/nim-gateway:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: nim-gateway
  namespace: ai-stack
spec:
  selector:
    app: nim-gateway
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP
